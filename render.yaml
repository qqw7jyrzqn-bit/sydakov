services:
  - type: web
    name: pto-info-system
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn pto_info_system.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: pto-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.9.0

databases:
  - name: pto-db
    plan: free
    databaseName: pto_db
    user: pto_user
