<!-- Виджет мессенджера -->
<div id="chat-widget">
    <!-- Кнопка открытия чата -->
    <button id="chat-toggle-btn" class="chat-toggle-btn" title="Открыть мессенджер">
        <i class="bi bi-chat-dots-fill"></i>
        <span id="chat-unread-badge" class="chat-badge" style="display: none;">0</span>
    </button>

    <!-- Окно чата -->
    <div id="chat-window" class="chat-window" style="display: none;">
        <!-- Заголовок -->
        <div class="chat-header">
            <h5 class="mb-0">
                <i class="bi bi-chat-dots"></i> Мессенджер
            </h5>
            <button id="chat-close-btn" class="btn-close" title="Закрыть"></button>
        </div>

        <!-- Список диалогов -->
        <div id="chat-conversations" class="chat-content">
            <div class="chat-search">
                <input type="text" id="chat-user-search" class="form-control" placeholder="Поиск пользователей...">
            </div>
            
            <div id="chat-conversations-list" class="chat-list">
                <div class="text-center text-muted py-3">
                    <i class="bi bi-chat-left-text"></i>
                    <p class="mb-0">Выберите пользователя для начала чата</p>
                </div>
            </div>
        </div>

        <!-- Окно переписки -->
        <div id="chat-messages-view" class="chat-content" style="display: none;">
            <div class="chat-messages-header">
                <button id="chat-back-btn" class="btn btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </button>
                <div class="chat-user-info">
                    <strong id="chat-current-user-name"></strong>
                </div>
            </div>
            
            <div id="chat-messages-container" class="chat-messages">
                <!-- Сообщения будут загружаться здесь -->
            </div>

            <div class="chat-input-container">
                <textarea id="chat-message-input" class="form-control" rows="2" placeholder="Введите сообщение..."></textarea>
                <button id="chat-send-btn" class="btn">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<style>

/* Поиск пользователей результаты */
#chat-search-results {
    max-height: 200px;
    overflow-y: auto;
    background: #FFFFFF;
    border: 1px solid #E0E0E0;

}

.chat-user-item {
    padding: 10px;
    border-bottom: 1px solid #E0E0E0;
    cursor: pointer;
    transition: background 0.2s;
    background: #FFFFFF;
}

.chat-user-item:hover {
    background: #F5F5F5;
}

.chat-user-item:last-child {

}

.chat-user-item .user-name {

    font-weight: 600;

    color: #757575;

.chat-list .text-muted {

.chat-conversation-item .text-muted.small {
    color: #9E9E9E !important;
    font-size: 12px;
}
</style>

<script>
// Мессенджер
const ChatWidget = {
    currentUserId: null,
    currentUserName: '',
    pollInterval: null,

    init() {
        this.bindEvents();
        this.updateUnreadCount();
        this.startPolling();
    },

    bindEvents() {
        // Открытие/закрытие чата
        document.getElementById('chat-toggle-btn').addEventListener('click', () => this.toggleChat());
        document.getElementById('chat-close-btn').addEventListener('click', () => this.closeChat());
        
        // Поиск пользователей
        const searchInput = document.getElementById('chat-user-search');
        searchInput.addEventListener('input', (e) => this.searchUsers(e.target.value));
        searchInput.addEventListener('focus', () => this.loadConversations());
        
        // Назад к списку диалогов
        document.getElementById('chat-back-btn').addEventListener('click', () => this.showConversationsList());
        
        // Отправка сообщения
        document.getElementById('chat-send-btn').addEventListener('click', () => this.sendMessage());
        document.getElementById('chat-message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                this.sendMessage();
            }
        });
    },

    toggleChat() {
        const window = document.getElementById('chat-window');
        if (window.style.display === 'none') {
            window.style.display = 'flex';
            this.loadConversations();
        } else {
            window.style.display = 'none';
        }
    },

    closeChat() {
        document.getElementById('chat-window').style.display = 'none';
    },

    async searchUsers(query) {
        try {
            const response = await fetch(`/accounts/chat/users/?search=${encodeURIComponent(query)}`);
            const data = await response.json();
            
            this.displaySearchResults(data.users);
        } catch (error) {
            console.error('Ошибка поиска пользователей:', error);
        }
    },

    displaySearchResults(users) {
        const list = document.getElementById('chat-conversations-list');
        
        if (users.length === 0) {
            list.innerHTML = '<div class="text-center text-muted py-3">Пользователи не найдены</div>';
            return;
        }
        
        list.innerHTML = users.map(user => `
            <div class="chat-user-item" onclick="ChatWidget.openChat(${user.id}, '${user.full_name}')">
                <div class="user-name">${user.full_name}</div>
                <div class="text-muted small">${user.role}</div>
            </div>
        `).join('');
    },

    async loadConversations() {
        try {
            const response = await fetch('/accounts/chat/conversations/');
            const data = await response.json();
            
            const list = document.getElementById('chat-conversations-list');
            
            if (data.conversations.length === 0) {
                list.innerHTML = '<div class="text-center text-muted py-3">Нет диалогов. Используйте поиск для начала чата.</div>';
                return;
            }
            
            list.innerHTML = data.conversations.map(conv => `
                <div class="chat-conversation-item" onclick="ChatWidget.openChat(${conv.user_id}, '${conv.full_name}')">
                    <div class="user-name">
                        ${conv.full_name}
                        ${conv.unread_count > 0 ? `<span class="unread-badge">${conv.unread_count}</span>` : ''}
                    </div>
                    <div class="last-message">${conv.last_message || 'Нет сообщений'}</div>
                    <div class="text-muted small">${conv.last_message_time}</div>
                </div>
            `).join('');
        } catch (error) {
            console.error('Ошибка загрузки диалогов:', error);
        }
    },

    async openChat(userId, userName) {
        this.currentUserId = userId;
        this.currentUserName = userName;
        
        document.getElementById('chat-current-user-name').textContent = userName;
        document.getElementById('chat-conversations').style.display = 'none';
        document.getElementById('chat-messages-view').style.display = 'flex';
        
        await this.loadMessages();
    },

    showConversationsList() {
        this.currentUserId = null;
        document.getElementById('chat-conversations').style.display = 'flex';
        document.getElementById('chat-messages-view').style.display = 'none';
        this.loadConversations();
    },

    async loadMessages() {
        if (!this.currentUserId) return;
        
        try {
            const response = await fetch(`/accounts/chat/messages/${this.currentUserId}/`);
            const data = await response.json();
            
            const container = document.getElementById('chat-messages-container');
            container.innerHTML = data.messages.map(msg => `
                <div class="chat-message ${msg.is_mine ? 'mine' : 'theirs'}">
                    <div class="chat-message-bubble">
                        ${msg.message}
                    </div>
                    <div class="chat-message-time">${msg.created_at}</div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
            this.updateUnreadCount();
        } catch (error) {
            console.error('Ошибка загрузки сообщений:', error);
        }
    },

    async sendMessage() {
        const input = document.getElementById('chat-message-input');
        const message = input.value.trim();
        
        if (!message || !this.currentUserId) return;
        
        try {
            const response = await fetch('/accounts/chat/send/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': this.getCookie('csrftoken')
                },
                body: JSON.stringify({
                    recipient_id: this.currentUserId,
                    message: message
                })
            });
            
            if (response.ok) {
                input.value = '';
                await this.loadMessages();
            }
        } catch (error) {
            console.error('Ошибка отправки сообщения:', error);
        }
    },

    async updateUnreadCount() {
        try {
            const response = await fetch('/accounts/chat/unread/');
            const data = await response.json();
            
            const badge = document.getElementById('chat-unread-badge');
            if (data.unread_count > 0) {
                badge.textContent = data.unread_count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        } catch (error) {
            console.error('Ошибка получения непрочитанных:', error);
        }
    },

    startPolling() {
        // Обновляем счётчик непрочитанных каждые 10 секунд
        this.pollInterval = setInterval(() => {
            this.updateUnreadCount();
            
            // Если открыт конкретный чат, обновляем сообщения
            if (this.currentUserId) {
                this.loadMessages();
            }
        }, 10000);
    },

    getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
};

// Инициализация при загрузке страницы
document.addEventListener('DOMContentLoaded', () => {
    ChatWidget.init();
});
</script>
