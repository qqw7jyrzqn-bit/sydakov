{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{% if object %}Редактировать{% else %}Создать{% endif %} скважину{% endblock %}

{% block content %}
<div class="row">
  <div class="col-md-8 offset-md-2">
    <div class="card">
      <div class="card-header">
        <h3>
          <i class="bi bi-{% if object %}pencil{% else %}plus-circle{% endif %}"></i>
          {% if object %}Редактировать{% else %}Создать{% endif %} скважину
        </h3>
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {% crispy form %}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
